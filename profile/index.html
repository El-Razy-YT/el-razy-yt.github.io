<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK22992</title>

<link rel="icon" type="image/png" href="../avatar.png">

<meta name="version" content="1.0.0.8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Exo 2',sans-serif;

    background:#030712;

    color:white;

    position:relative;
}

/* BACKGROUND */

.bg{

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(0,153,255,0.25),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(0,102,255,0.18),
    transparent 35%),

    linear-gradient(
    135deg,
    #020816,
    #071225,
    #020816);

    z-index:-5;
}

/* GRID */

.grid{

    position:absolute;
    inset:0;

    background-image:
    linear-gradient(
    rgba(0,170,255,0.05) 1px,
    transparent 1px),

    linear-gradient(
    90deg,
    rgba(0,170,255,0.05) 1px,
    transparent 1px);

    background-size:50px 50px;

    z-index:-4;
}

/* RINGS */

.ring{

    position:absolute;

    border-radius:50%;

    border:1px solid rgba(0,170,255,0.18);

    animation:spin 18s linear infinite;
}

.ring.one{
    width:700px;
    height:700px;
}

.ring.two{

    width:950px;
    height:950px;

    animation-direction:reverse;
    animation-duration:25s;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

/* SIDEBAR */

.sidebar{

    position:fixed;
    left:-280px;
    top:0;

    width:260px;
    height:100vh;

    background:rgba(3,7,18,0.95);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(0,170,255,0.1);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;

    padding:40px 20px 20px;

    gap:30px;

    z-index:100;

    transition:left 0.4s ease;
}

.sidebar.active{
    left:0;
}

.sidebar-toggle{

    position:fixed;
    left:20px;
    top:20px;

    width:40px;
    height:40px;

    background:rgba(0,170,255,0.08);
    border:1px solid rgba(0,170,255,0.16);
    border-radius:10px;

    color:#00aaff;
    font-size:1.2rem;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;
    transition:0.35s ease;
    z-index:101;
}

.sidebar-toggle:hover{

    background:rgba(0,170,255,0.14);
    box-shadow:0 0 20px rgba(0,170,255,0.25);
    transform:scale(1.05);
}

.sidebar-nav{

    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav-link{

    width:100%;
    padding:14px 16px;

    text-decoration:none;
    color:white;

    background:rgba(0,170,255,0.06);
    border:1px solid rgba(0,170,255,0.12);
    border-radius:10px;

    font-family:'Orbitron',sans-serif;
    font-size:0.8rem;
    letter-spacing:1px;

    display:flex;
    align-items:center;
    gap:12px;

    transition:0.35s ease;
}

.nav-link:hover{

    background:rgba(0,170,255,0.14);
    border-color:rgba(0,170,255,0.25);
    box-shadow:0 0 15px rgba(0,170,255,0.2);
    transform:translateX(4px);
}

.nav-link i{
    color:#00aaff;
    font-size:1.1rem;
}

.nav-link.active{

    background:rgba(0,170,255,0.12);
    border-color:rgba(0,170,255,0.25);
    box-shadow:0 0 20px rgba(0,170,255,0.25);
}

.nav-link:nth-child(1){
    background:rgba(0,200,255,0.08);
    border-color:rgba(0,200,255,0.15);
}

.nav-link:nth-child(1):hover{
    background:rgba(0,200,255,0.15);
    border-color:rgba(0,200,255,0.3);
    box-shadow:0 0 15px rgba(0,200,255,0.25);
}

.nav-link:nth-child(1).active{
    background:rgba(0,200,255,0.15);
    border-color:rgba(0,200,255,0.3);
    box-shadow:0 0 20px rgba(0,200,255,0.3);
}

.nav-link:nth-child(2){
    background:rgba(150,100,255,0.08);
    border-color:rgba(150,100,255,0.15);
}

.nav-link:nth-child(2):hover{
    background:rgba(150,100,255,0.15);
    border-color:rgba(150,100,255,0.3);
    box-shadow:0 0 15px rgba(150,100,255,0.25);
}

.nav-link:nth-child(2).active{
    background:rgba(150,100,255,0.15);
    border-color:rgba(150,100,255,0.3);
    box-shadow:0 0 20px rgba(150,100,255,0.3);
}

.nav-link:nth-child(3){
    background:rgba(255,100,200,0.08);
    border-color:rgba(255,100,200,0.15);
}

.nav-link:nth-child(3):hover{
    background:rgba(255,100,200,0.15);
    border-color:rgba(255,100,200,0.3);
    box-shadow:0 0 15px rgba(255,100,200,0.25);
}

.nav-link:nth-child(3).active{
    background:rgba(255,100,200,0.15);
    border-color:rgba(255,100,200,0.3);
    box-shadow:0 0 20px rgba(255,100,200,0.3);
}

.sidebar-divider{
    width:100%;
    height:1px;
    background:rgba(0,170,255,0.1);
}

/* HOME BUTTON */

.home-btn{

    position:fixed;

    top:18px;
    left:70px;

    padding:10px 18px;

    text-decoration:none;

    color:white;

    background:rgba(0,170,255,0.08);

    border:1px solid rgba(0,170,255,0.18);

    border-radius:12px;

    font-family:'Orbitron',sans-serif;

    font-size:0.75rem;

    letter-spacing:2px;

    backdrop-filter:blur(10px);

    transition:0.35s ease;

    z-index:50;
}

.home-btn:hover{

    transform:translateY(-4px) scale(1.03);

    background:rgba(0,170,255,0.14);

    box-shadow:
    0 0 20px rgba(0,170,255,0.25);
}

/* MAIN */

.container{

    width:90%;
    max-width:1300px;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;

    z-index:2;
}

/* PROFILE */

.profile{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:28px;

    margin-bottom:70px;

    flex-wrap:wrap;
}

.pfp{
    position:relative;
}

.pfp::before{

    content:"";

    position:absolute;

    inset:-8px;

    border-radius:50%;

    background:conic-gradient(
        from 0deg,
        #00aaff,
        transparent,
        #00aaff
    );

    animation:spin 5s linear infinite;

    z-index:-1;
}

.profile img{

    width:150px;
    height:150px;

    object-fit:cover;

    border-radius:50%;

    border:4px solid #071225;

    box-shadow:
    0 0 30px rgba(0,170,255,0.45),
    0 0 70px rgba(0,170,255,0.18);

    transition:0.4s ease;
}

.profile img:hover{

    transform:scale(1.06) rotate(2deg);

    box-shadow:
    0 0 45px rgba(0,170,255,0.6),
    0 0 90px rgba(0,170,255,0.22);
}

.profile h1{

    font-family:'Orbitron',sans-serif;

    font-size:4rem;

    letter-spacing:8px;

    color:#00aaff;

    text-shadow:
    0 0 10px rgba(0,170,255,0.9),
    0 0 25px rgba(0,170,255,0.55),
    0 0 45px rgba(0,170,255,0.25);

    transition:0.35s ease;
}

.profile h1:hover{

    transform:translateY(-3px);

    text-shadow:
    0 0 15px rgba(0,170,255,1),
    0 0 40px rgba(0,170,255,0.55);
}

/* BUTTONS */

.links{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:28px;

    flex-wrap:wrap;
}

.btn{

    width:240px;
    height:78px;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:14px;

    text-decoration:none;

    color:white;

    background:rgba(0,170,255,0.06);

    border:1px solid rgba(0,170,255,0.18);

    clip-path:polygon(
        12% 0%,
        100% 0%,
        100% 70%,
        88% 100%,
        0% 100%,
        0% 30%
    );

    backdrop-filter:blur(10px);

    transition:0.35s ease;
}

.btn:hover{

    transform:translateY(-8px) scale(1.03);

    box-shadow:
    0 0 25px rgba(0,170,255,0.45),
    0 0 55px rgba(0,170,255,0.22);
}

.btn i{

    font-size:1.5rem;

    color:#00aaff;
}

.btn span{

    font-size:1rem;

    letter-spacing:1px;
}

.roblox-logo{

    width:24px;
    height:24px;

    position:relative;

    transform:rotate(18deg);

    display:flex;
    justify-content:center;
    align-items:center;
}

.roblox-logo .outer{

    width:22px;
    height:22px;

    border:4px solid #00aaff;
}

.roblox-logo .inner{

    position:absolute;

    width:7px;
    height:7px;

    background:#00aaff;
}

/* VERSION */

.version-tag{

    position:fixed;

    left:16px;
    bottom:12px;

    font-family:'Orbitron',sans-serif;

    font-size:0.72rem;

    letter-spacing:2px;

    color:rgba(0,170,255,0.75);

    user-select:none;
}

@media(max-width:850px){

    body{
        overflow:auto;
        padding:40px 0;
    }

    .profile{
        flex-direction:column;
    }

    .profile h1{
        font-size:2.5rem;
    }

    .links{
        flex-direction:column;
    }

    .btn{
        width:100%;
        max-width:320px;
    }

}

</style>

</head>

<body>

<!-- SIDEBAR TOGGLE -->

<div class="sidebar-toggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
</div>

<!-- HOME BUTTON -->

<a class="home-btn" href="/">
    HOME
</a>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
        <a class="nav-link" href="/" onclick="closeSidebar()">
            <i class="fa-solid fa-house"></i>
            HOME
        </a>
        <a class="nav-link active" href="/profile/" onclick="closeSidebar()">
            <i class="fa-solid fa-user"></i>
            PROFILE
        </a>
        <a class="nav-link" href="/videos/" onclick="closeSidebar()">
            <i class="fa-brands fa-youtube"></i>
            SHORTS
        </a>
    </div>
</div>

<div class="bg"></div>
<div class="grid"></div>

<div class="ring one"></div>
<div class="ring two"></div>

<div class="container">

    <div class="profile">

        <div class="pfp">
            <img src="../avatar.png" alt="AK22992">
        </div>

        <h1>AK22992</h1>

    </div>

    <div class="links">

        <a class="btn"
        href="https://discord.gg/XyJXDK6JYK"
        target="_blank">

            <i class="fa-brands fa-discord"></i>
            <span>Cerritus Imperium</span>

        </a>

        <a class="btn"
        href="https://www.youtube.com/@ElRazy_YT"
        target="_blank">

            <i class="fa-brands fa-youtube"></i>
            <span>ElRazy_YT</span>

        </a>

        <a class="btn"
        href="https://in.pinterest.com/elrazy_yt/"
        target="_blank">

            <i class="fa-brands fa-pinterest"></i>
            <span>ElRazy_YT</span>

        </a>

        <a class="btn"
        href="https://open.spotify.com/user/31xxu5adkibxvp4npp4kv4naqvmi"
        target="_blank">

            <i class="fa-brands fa-spotify"></i>
            <span>AK22992</span>

        </a>

        <a class="btn"
        href="https://www.roblox.com/users/4424058637/profile"
        target="_blank">

            <div class="roblox-logo">
                <div class="outer"></div>
                <div class="inner"></div>
            </div>

            <span>AK22992</span>

        </a>

    </div>

</div>

<div class="version-tag">
    v1.0.0.8
</div>

<script>

function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
}

function closeSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.remove('active');
}

// Close sidebar when clicking outside
document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    const toggle = document.querySelector('.sidebar-toggle');
    if (!sidebar.contains(event.target) && !toggle.contains(event.target)) {
        sidebar.classList.remove('active');
    }
});

</script>

</body>
</html>
