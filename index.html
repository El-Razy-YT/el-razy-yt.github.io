<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AK22992</title>

<!-- TAB ICON -->
<link rel="icon" type="image/png" href="avatar.png">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        #140000,
        #330000,
        #700000,
        #ff1f1f
    );

    background-size:400% 400%;
    animation:bg 12s ease infinite;

    color:white;
}

/* Animated Background */

@keyframes bg{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* Glow Effects */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.4;
}

.glow1{
    width:350px;
    height:350px;
    background:red;

    top:-120px;
    left:-120px;
}

.glow2{
    width:300px;
    height:300px;
    background:#ff5555;

    bottom:-120px;
    right:-120px;
}

/* Floating Background Icons */

.floating-icons i{
    position:absolute;
    color:rgba(255,255,255,0.05);

    animation:float 8s ease-in-out infinite;
}

.floating-icons i:nth-child(1){
    font-size:100px;
    top:10%;
    left:8%;
}

.floating-icons i:nth-child(2){
    font-size:120px;
    top:70%;
    left:12%;
}

.floating-icons i:nth-child(3){
    font-size:90px;
    top:20%;
    right:10%;
}

.floating-icons i:nth-child(4){
    font-size:100px;
    bottom:15%;
    right:12%;
}

.floating-icons i:nth-child(5){
    font-size:120px;
    top:45%;
    left:45%;
}

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }
}

/* Navbar */

nav{
    width:100%;
    padding:20px 60px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    position:relative;
    z-index:10;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#ffb3b3;
}

/* Pages */

.page{
    width:100%;
    height:100vh;

    position:absolute;
    top:0;
    left:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.5s;

    padding:20px;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform:translateY(30px);
}

.active{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0px);
}

/* Home Page */

.hero{
    text-align:center;
}

.avatar{
    width:230px;
    height:230px;

    border-radius:50%;
    object-fit:cover;

    border:5px solid rgba(255,255,255,0.12);

    box-shadow:0 0 45px rgba(255,0,0,0.5);

    margin-bottom:25px;

    animation:avatarFloat 4s ease-in-out infinite;
}

@keyframes avatarFloat{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }
}

.hero h1{
    font-size:75px;
    margin-bottom:15px;
}

.hero p{
    max-width:750px;

    font-size:20px;
    line-height:1.7;

    opacity:0.9;
}

/* Socials Page */

.social-title{
    font-size:60px;
    margin-bottom:40px;
}

.socials{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card{
    width:190px;
    height:190px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.08);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-decoration:none;
    color:white;

    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);

    background:rgba(255,255,255,0.15);

    box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.card i{
    font-size:55px;
    margin-bottom:15px;
}

.card span{
    font-size:22px;
}

/* Responsive */

@media(max-width:768px){

    nav{
        padding:20px;
    }

    .hero h1{
        font-size:45px;
    }

    .hero p{
        font-size:16px;
    }

    .avatar{
        width:170px;
        height:170px;
    }

    .social-title{
        font-size:40px;
    }

    .card{
        width:145px;
        height:145px;
    }

}

</style>

</head>

<body>

<!-- Glow -->

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<!-- Floating Icons -->

<div class="floating-icons">

<i class="fab fa-discord"></i>
<i class="fab fa-youtube"></i>
<i class="fas fa-gamepad"></i>
<i class="fab fa-pinterest"></i>
<i class="fab fa-spotify"></i>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">AK22992</div>

<ul>

<li>
<a href="#"
onclick="showPage('home')">
Portfolio
</a>
</li>

<li>
<a href="#"
onclick="showPage('socials')">
Socials
</a>
</li>

</ul>

</nav>

<!-- HOME PAGE -->

<section id="home" class="page active">

<div class="hero">

<img src="avatar.png" class="avatar">

<h1>AK22992</h1>

<p>
Hey! I'm a content creator, Discord moderator,
gaming enthusiast and tech lover who enjoys
Roblox, modern UI design and creating cool
gaming themed projects and websites.
</p>

</div>

</section>

<!-- SOCIAL PAGE -->

<section id="socials" class="page hidden">

<h1 class="social-title">MY SOCIALS</h1>

<div class="socials">

<a class="card"
href="https://discord.com/invite/XyJXDK6JYK"
target="_blank">

<i class="fab fa-discord"></i>
<span>Discord</span>

</a>

<a class="card"
href="https://www.youtube.com/@ElRazy_YT"
target="_blank">

<i class="fab fa-youtube"></i>
<span>YouTube</span>

</a>

<a class="card"
href="https://www.roblox.com/users/4424058637/profile"
target="_blank">

<i class="fas fa-gamepad"></i>
<span>Roblox</span>

</a>

<a class="card"
href="https://in.pinterest.com/elrazy_yt/"
target="_blank">

<i class="fab fa-pinterest"></i>
<span>Pinterest</span>

</a>

<a class="card"
href="https://open.spotify.com/user/31xxu5adkibxvp4npp4kv4naqvmi"
target="_blank">

<i class="fab fa-spotify"></i>
<span>Spotify</span>

</a>

</div>

</section>

<script>

function showPage(pageId){

    let pages = document.querySelectorAll(".page");

    pages.forEach(page => {

        page.classList.remove("active");
        page.classList.add("hidden");

    });

    document.getElementById(pageId)
    .classList.remove("hidden");

    document.getElementById(pageId)
    .classList.add("active");
}

</script>

</body>
</html>
