<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ElRazy | Shorts</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
  }

  header {
    padding: 18px;
    text-align: center;
    background: #11182a;
    font-size: 22px;
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    padding: 20px;
  }

  /* Shorts-style vertical frame */
  .short {
    position: relative;
    width: 100%;
    padding-top: 177.77%; /* 9:16 ratio */
    background: #111;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }

  .short iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .title {
    font-size: 12px;
    padding: 8px;
    color: #bbb;
    text-align: center;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: #aaa;
  }

  .note {
    text-align: center;
    font-size: 12px;
    color: #777;
    padding-bottom: 10px;
  }
</style>
</head>

<body>

<header>🔥 Latest Shorts - ElRazy_YT</header>
<div class="note">Auto-updating from YouTube channel</div>

<div id="grid" class="grid">
  <div class="loading">Loading Shorts...</div>
</div>

<script>
const FEED_URL = "https://www.youtube.com/feeds/videos.xml?user=ElRazy_YT";

async function loadShorts() {
  try {
    const res = await fetch(FEED_URL);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const entries = xml.querySelectorAll("entry");
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let count = 0;

    entries.forEach(entry => {
      const title = entry.querySelector("title").textContent;
      const videoId = entry.querySelector("yt\\:videoId").textContent;

      // OPTIONAL filter: show only Shorts if tagged
      const isShort = title.toLowerCase().includes("#shorts");

      // If no Shorts found yet, fallback to all videos
      const allow = isShort || count < 10;

      if (allow && count < 12) {
        const div = document.createElement("div");

        div.innerHTML = `
          <div class="short">
            <iframe 
              src="https://www.youtube.com/embed/${videoId}" 
              allowfullscreen>
            </iframe>
          </div>
          <div class="title">${title}</div>
        `;

        grid.appendChild(div);
        count++;
      }
    });

    if (count === 0) {
      grid.innerHTML = `<div class="loading">No videos found.</div>`;
    }

  } catch (err) {
    console.error(err);
    document.getElementById("grid").innerHTML =
      "<div class='loading'>Failed to load content.</div>";
  }
}

loadShorts();
</script>

</body>
</html>
