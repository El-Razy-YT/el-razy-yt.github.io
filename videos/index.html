<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElRazy_YT | Shorts</title>

<link rel="icon" type="image/png" href="../avatar.png">

<meta name="version" content="1.0.0.2">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    overflow-x:hidden;
    overflow-y:auto;

    display:flex;
    flex-direction:column;

    font-family:'Poppins',sans-serif;

    background:#030712;

    color:white;

    position:relative;

    padding:0;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(0,153,255,0.22),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(0,102,255,0.18),
    transparent 35%),

    linear-gradient(
    135deg,
    #020816,
    #071225,
    #020816);

    z-index:-10;
}

/* GRID */

.grid-bg{

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(
    rgba(0,170,255,0.04) 1px,
    transparent 1px),

    linear-gradient(
    90deg,
    rgba(0,170,255,0.04) 1px,
    transparent 1px);

    background-size:50px 50px;

    z-index:-9;
}

/* HEADER */

header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 28px;

    background:rgba(3,7,18,0.7);

    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(0,170,255,0.1);

    position:relative;

    z-index:20;
}

.header-title{

    display:flex;
    flex-direction:column;
    gap:4px;
}

.header-title h1{

    font-family:'Orbitron',sans-serif;

    font-size:1.3rem;

    letter-spacing:3px;

    color:#00aaff;

    text-shadow:
    0 0 10px rgba(0,170,255,0.6),
    0 0 20px rgba(0,170,255,0.3);
}

.header-title .version{

    font-size:0.7rem;

    color:rgba(0,170,255,0.6);

    letter-spacing:1px;
}

.home-btn{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    gap:8px;

    padding:10px 20px;

    text-decoration:none;

    color:white;

    background:rgba(0,170,255,0.08);

    border:1px solid rgba(0,170,255,0.16);

    border-radius:10px;

    font-family:'Orbitron',sans-serif;

    font-size:0.75rem;

    letter-spacing:1.5px;

    transition:0.35s ease;
}

.home-btn:hover{

    transform:translateY(-3px);

    background:rgba(0,170,255,0.14);

    box-shadow:
    0 0 20px rgba(0,170,255,0.28);
}

.home-btn i{

    color:#00aaff;
}

/* MAIN CONTAINER */

.container{

    flex:1;

    width:100%;

    max-width:1400px;

    margin:0 auto;

    padding:40px 28px;

    position:relative;

    z-index:5;
}

/* TITLE SECTION */

.section-header{

    text-align:center;

    margin-bottom:50px;

    animation:fadeIn 1.2s ease;
}

.section-header h2{

    font-family:'Orbitron',sans-serif;

    font-size:2.5rem;

    letter-spacing:5px;

    color:#00aaff;

    text-shadow:
    0 0 15px rgba(0,170,255,0.7),
    0 0 30px rgba(0,170,255,0.3);

    margin-bottom:12px;
}

.section-header p{

    color:rgba(255,255,255,0.8);

    font-size:0.95rem;

    letter-spacing:1px;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* SHORTS GRID */

.shorts-grid{

    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:28px;

    animation:fadeIn 1.2s ease 0.2s both;
}

.short-card{

    background:rgba(18,26,46,0.6);

    backdrop-filter:blur(10px);

    border:1px solid rgba(0,170,255,0.1);

    border-radius:16px;

    overflow:hidden;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.3),
    0 0 20px rgba(0,170,255,0.05);

    transition:0.45s ease;

    cursor:pointer;
}

.short-card:hover{

    transform:translateY(-8px) scale(1.02);

    border-color:rgba(0,170,255,0.25);

    box-shadow:
    0 12px 40px rgba(0,0,0,0.5),
    0 0 30px rgba(0,170,255,0.15);
}

.short-wrapper{

    position:relative;

    width:100%;

    padding-bottom:177.77%; /* 9:16 */

    background:#0a0f20;

    overflow:hidden;
}

.short-wrapper iframe{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    border:none;
}

.short-meta{

    padding:18px;
}

.short-meta h3{

    font-size:0.95rem;

    color:rgba(255,255,255,0.95);

    line-height:1.5;

    font-weight:500;

    margin-bottom:8px;

    word-break:break-word;
}

.short-meta .date{

    font-size:0.75rem;

    color:rgba(0,170,255,0.7);

    letter-spacing:0.5px;
}

/* LOADING STATE */

.loading-message{

    text-align:center;

    padding:80px 20px;

    color:rgba(0,170,255,0.8);

    font-size:1.1rem;

    letter-spacing:2px;
}

.loading-spinner{

    display:inline-block;

    width:40px;
    height:40px;

    border:3px solid rgba(0,170,255,0.2);
    border-top-color:#00aaff;

    border-radius:50%;

    animation:spin 0.8s linear infinite;

    margin-bottom:20px;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

/* ERROR STATE */

.error-message{

    text-align:center;

    padding:60px 20px;

    color:rgba(255,150,100,0.9);

    font-size:1rem;

    letter-spacing:1px;

    background:rgba(255,0,0,0.05);

    border:1px solid rgba(255,100,100,0.2);

    border-radius:12px;

    margin:40px auto;

    max-width:500px;
}

/* RESPONSIVE */

@media(max-width:768px){

    header{
        padding:14px 16px;
    }

    .header-title h1{
        font-size:1rem;
        letter-spacing:2px;
    }

    .container{
        padding:24px 16px;
    }

    .section-header h2{
        font-size:1.8rem;
        letter-spacing:3px;
    }

    .shorts-grid{
        grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
        gap:16px;
    }

    .short-card{
        border-radius:12px;
    }

    .short-meta{
        padding:12px;
    }

    .short-meta h3{
        font-size:0.85rem;
    }

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="grid-bg"></div>

<header>
    <div class="header-title">
        <h1>🔥 LATEST SHORTS</h1>
        <div class="version">v1.0.0.2</div>
    </div>
    <a class="home-btn" href="https://el-razy-yt.github.io/">
        <i class="fa-solid fa-house"></i>
        HOME
    </a>
</header>

<div class="container">

    <div class="section-header">
        <h2>ElRazy_YT</h2>
        <p>Watch My Latest YouTube Shorts</p>
    </div>

    <div id="grid" class="shorts-grid">
        <div class="loading-message">
            <div class="loading-spinner"></div>
            <div>Loading your shorts...</div>
        </div>
    </div>

</div>

<script>

const FEED = encodeURIComponent(
    "https://www.youtube.com/feeds/videos.xml?user=ElRazy_YT"
);

const URL = "https://api.allorigins.win/raw?url=" + FEED;

async function loadShorts() {
    try {
        const res = await fetch(URL);
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");

        const entries = xml.querySelectorAll("entry");

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        let count = 0;

        entries.forEach(entry => {
            const title = entry.querySelector("title").textContent;
            const videoId = entry.querySelector("yt\\:videoId").textContent;
            const published = entry.querySelector("published").textContent;

            if (count < 12) {
                const card = document.createElement("div");
                card.className = "short-card";

                const date = new Date(published).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                card.innerHTML = `
                    <div class="short-wrapper">
                        <iframe
                            src="https://www.youtube.com/embed/${videoId}?controls=1"
                            allowfullscreen
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                        </iframe>
                    </div>
                    <div class="short-meta">
                        <h3>${title}</h3>
                        <div class="date">${date}</div>
                    </div>
                `;

                grid.appendChild(card);
                count++;
            }
        });

        if (count === 0) {
            grid.innerHTML = `<div class="error-message">No shorts found. Please check back later!</div>`;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("grid").innerHTML =
            `<div class="error-message">
                <i class="fa-solid fa-exclamation-circle"></i>
                <div>Failed to load shorts. Please try again later.</div>
            </div>`;
    }
}

loadShorts();

</script>

</body>
</html>
