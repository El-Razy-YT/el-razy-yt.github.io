<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElRazy_YT | Videos</title>

<link rel="icon" type="image/png" href="../avatar.png">

<meta name="version" content="1.0.0.10">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    overflow-x:hidden;
    overflow-y:auto;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    font-family:'Poppins',sans-serif;

    background:#030712;

    color:white;

    position:relative;

    padding:40px 25px;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(0,153,255,0.22),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(0,102,255,0.18),
    transparent 35%),

    linear-gradient(
    135deg,
    #020816,
    #071225,
    #020816);

    z-index:-10;
}

/* GRID */

.grid{

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(
    rgba(0,170,255,0.04) 1px,
    transparent 1px),

    linear-gradient(
    90deg,
    rgba(0,170,255,0.04) 1px,
    transparent 1px);

    background-size:50px 50px;

    z-index:-9;
}

/* FLOATING ICONS */

.float-icon{

    position:fixed;

    color:rgba(0,170,255,0.08);

    z-index:-2;

    animation:float 8s ease-in-out infinite;
}

.float-icon i{
    filter:drop-shadow(0 0 15px rgba(0,170,255,0.2));
}

.icon1{
    top:8%;
    left:8%;
    font-size:4rem;
    animation-duration:10s;
}

.icon2{
    top:18%;
    right:12%;
    font-size:5rem;
    animation-duration:13s;
}

.icon3{
    bottom:14%;
    left:10%;
    font-size:4.5rem;
    animation-duration:11s;
}

.icon4{
    bottom:10%;
    right:9%;
    font-size:5rem;
    animation-duration:14s;
}

.icon5{
    top:50%;
    left:45%;
    font-size:4rem;
    animation-duration:12s;
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translateY(0px) rotate(0deg);
    }

    50%{
        transform:translateY(-20px) rotate(8deg);
    }

    100%{
        transform:translateY(0px) rotate(0deg);
    }
}

/* SIDEBAR */

.sidebar{

    position:fixed;
    left:-280px;
    top:0;

    width:260px;
    height:100vh;

    background:rgba(3,7,18,0.95);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(0,170,255,0.1);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;

    padding:40px 20px 20px;

    gap:30px;

    z-index:100;

    transition:left 0.4s ease;
}

.sidebar.active{
    left:0;
}

.sidebar-toggle{

    position:fixed;
    left:20px;
    top:20px;

    width:40px;
    height:40px;

    background:rgba(0,170,255,0.08);
    border:1px solid rgba(0,170,255,0.16);
    border-radius:10px;

    color:#00aaff;
    font-size:1.2rem;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;
    transition:0.35s ease;
    z-index:101;
}

.sidebar-toggle:hover{

    background:rgba(0,170,255,0.14);
    box-shadow:0 0 20px rgba(0,170,255,0.25);
    transform:scale(1.05);
}

.sidebar-nav{

    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav-link{

    width:100%;
    padding:14px 16px;

    text-decoration:none;
    color:white;

    background:rgba(0,170,255,0.06);
    border:1px solid rgba(0,170,255,0.12);
    border-radius:10px;

    font-family:'Orbitron',sans-serif;
    font-size:0.8rem;
    letter-spacing:1px;

    display:flex;
    align-items:center;
    gap:12px;

    transition:0.35s ease;
}

.nav-link:hover{

    background:rgba(0,170,255,0.14);
    border-color:rgba(0,170,255,0.25);
    box-shadow:0 0 15px rgba(0,170,255,0.2);
    transform:translateX(4px);
}

.nav-link i{
    color:#00aaff;
    font-size:1.1rem;
}

.nav-link.active{

    background:rgba(0,170,255,0.12);
    border-color:rgba(0,170,255,0.25);
    box-shadow:0 0 20px rgba(0,170,255,0.25);
}

.nav-link:nth-child(1){
    background:rgba(0,200,255,0.08);
    border-color:rgba(0,200,255,0.15);
}

.nav-link:nth-child(1):hover{
    background:rgba(0,200,255,0.15);
    border-color:rgba(0,200,255,0.3);
    box-shadow:0 0 15px rgba(0,200,255,0.25);
}

.nav-link:nth-child(1).active{
    background:rgba(0,200,255,0.15);
    border-color:rgba(0,200,255,0.3);
    box-shadow:0 0 20px rgba(0,200,255,0.3);
}

.nav-link:nth-child(2){
    background:rgba(150,100,255,0.08);
    border-color:rgba(150,100,255,0.15);
}

.nav-link:nth-child(2):hover{
    background:rgba(150,100,255,0.15);
    border-color:rgba(150,100,255,0.3);
    box-shadow:0 0 15px rgba(150,100,255,0.25);
}

.nav-link:nth-child(2).active{
    background:rgba(150,100,255,0.15);
    border-color:rgba(150,100,255,0.3);
    box-shadow:0 0 20px rgba(150,100,255,0.3);
}

.nav-link:nth-child(3){
    background:rgba(255,100,200,0.08);
    border-color:rgba(255,100,200,0.15);
}

.nav-link:nth-child(3):hover{
    background:rgba(255,100,200,0.15);
    border-color:rgba(255,100,200,0.3);
    box-shadow:0 0 15px rgba(255,100,200,0.25);
}

.nav-link:nth-child(3).active{
    background:rgba(255,100,200,0.15);
    border-color:rgba(255,100,200,0.3);
    box-shadow:0 0 20px rgba(255,100,200,0.3);
}

.sidebar-divider{
    width:100%;
    height:1px;
    background:rgba(0,170,255,0.1);
}

/* HOME BUTTON */

.home-btn{

    position:fixed;

    top:20px;
    left:70px;

    padding:10px 16px;

    text-decoration:none;

    color:white;

    background:rgba(0,170,255,0.08);

    border:1px solid rgba(0,170,255,0.16);

    border-radius:10px;

    font-family:'Orbitron',sans-serif;

    font-size:0.7rem;

    letter-spacing:1px;

    display:inline-flex;
    align-items:center;
    gap:8px;

    transition:0.35s ease;

    z-index:50;
}

.home-btn:hover{

    background:rgba(0,170,255,0.14);
    box-shadow:0 0 15px rgba(0,170,255,0.2);
    transform:translateY(-3px);
}

.home-btn i{
    color:#00aaff;
}

/* MAIN */

.container{

    width:100%;
    max-width:1200px;

    text-align:center;

    position:relative;

    z-index:5;

    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* TITLE */

.title-section{

    margin-bottom:50px;
}

.title-section h1{

    font-family:'Orbitron',sans-serif;

    font-size:3rem;

    letter-spacing:6px;

    color:#00aaff;

    text-shadow:
    0 0 10px rgba(0,170,255,0.9),
    0 0 25px rgba(0,170,255,0.5);

    transition:0.4s ease;

    margin-bottom:8px;
}

.title-section h1:hover{

    transform:translateY(-4px);

    text-shadow:
    0 0 18px rgba(0,170,255,1),
    0 0 40px rgba(0,170,255,0.6);
}

.title-section p{

    color:rgba(255,255,255,0.8);

    font-size:0.95rem;

    letter-spacing:1px;
}

/* VIDEOS GRID */

.videos-grid{

    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:24px;

    animation:fadeIn 1.2s ease 0.2s both;
}

.video-card{

    background:rgba(18,26,46,0.4);

    backdrop-filter:blur(8px);

    border:1px solid rgba(0,170,255,0.12);

    border-radius:14px;

    overflow:hidden;

    box-shadow:
    0 0 20px rgba(0,0,0,0.3),
    0 0 15px rgba(0,170,255,0.08);

    transition:0.45s ease;

    cursor:pointer;
}

.video-card:hover{

    transform:translateY(-6px) scale(1.02);

    border-color:rgba(0,170,255,0.25);

    background:rgba(18,26,46,0.6);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 0 25px rgba(0,170,255,0.15);
}

.video-wrapper{

    position:relative;

    width:100%;

    padding-bottom:56.25%; /* 16:9 */

    background:#0a0f20;

    overflow:hidden;
}

.video-wrapper img{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;
    transform:scale(1.01);
    transition:transform 0.45s ease;
}

.video-card:hover .video-wrapper img{
    transform:scale(1.06);
}

.video-badge{
    position:absolute;
    left:10px;
    bottom:10px;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(3,7,18,0.7);
    border:1px solid rgba(0,170,255,0.16);
    color:rgba(255,255,255,0.9);
    font-size:0.72rem;
    letter-spacing:1px;
    backdrop-filter:blur(10px);
}

.video-meta{

    padding:12px;

    background:rgba(3,7,18,0.5);

    border-top:1px solid rgba(0,170,255,0.08);
}

.video-meta h3{

    font-size:0.85rem;

    color:rgba(255,255,255,0.9);

    line-height:1.4;

    font-weight:500;

    word-break:break-word;

    text-align:left;
}

.video-meta .meta-row{
    margin-top:8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
}

.video-meta time{
    font-size:0.78rem;
    color:rgba(0,170,255,0.75);
    letter-spacing:1px;
}

.watch-btn{
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:10px;
    background:rgba(0,170,255,0.08);
    border:1px solid rgba(0,170,255,0.16);
    color:white;
    font-family:'Orbitron',sans-serif;
    font-size:0.65rem;
    letter-spacing:1px;
    transition:0.35s ease;
}

.watch-btn:hover{
    background:rgba(0,170,255,0.14);
    box-shadow:0 0 18px rgba(0,170,255,0.22);
    transform:translateY(-2px);
}

/* LOADING */

.loading{

    text-align:center;

    padding:60px 20px;

    color:rgba(0,170,255,0.8);

    font-size:1rem;

    letter-spacing:2px;
}

.loading-spinner{

    display:inline-block;

    width:35px;
    height:35px;

    border:3px solid rgba(0,170,255,0.2);
    border-top-color:#00aaff;

    border-radius:50%;

    animation:spin 0.8s linear infinite;

    margin-bottom:16px;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

/* VERSION */

.version{

    position:fixed;

    left:20px;
    bottom:16px;

    color:rgba(0,170,255,0.72);

    font-size:0.7rem;

    font-family:'Orbitron',sans-serif;

    letter-spacing:2px;

    z-index:50;
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding:50px 18px;
    }

    .title-section h1{
        font-size:2rem;
    }

    .videos-grid{
        grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
        gap:16px;
    }

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<!-- FLOATING ICONS -->

<div class="float-icon icon1">
    <i class="fa-brands fa-discord"></i>
</div>

<div class="float-icon icon2">
    <i class="fa-brands fa-youtube"></i>
</div>

<div class="float-icon icon3">
    <i class="fa-brands fa-spotify"></i>
</div>

<div class="float-icon icon4">
    <i class="fa-brands fa-pinterest"></i>
</div>

<div class="float-icon icon5">
    <i class="fa-brands fa-roblox"></i>
</div>

<!-- SIDEBAR TOGGLE -->

<div class="sidebar-toggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
</div>

<!-- HOME BUTTON -->

<a class="home-btn" href="/">
    <i class="fa-solid fa-house"></i>
    HOME
</a>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
        <a class="nav-link" href="/" onclick="closeSidebar()">
            <i class="fa-solid fa-house"></i>
            HOME
        </a>
        <a class="nav-link" href="/profile/" onclick="closeSidebar()">
            <i class="fa-solid fa-user"></i>
            PROFILE
        </a>
        <a class="nav-link active" href="/videos/" onclick="closeSidebar()">
            <i class="fa-brands fa-youtube"></i>
            VIDEOS
        </a>
    </div>
</div>

<!-- MAIN -->

<div class="container">

    <div class="title-section">
        <h1>LATEST VIDEOS</h1>
        <p>Watch my latest uploads from YouTube</p>
    </div>

    <div id="grid" class="videos-grid">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>Loading videos...</div>
        </div>
    </div>

</div>

<div class="version">
    v1.0.0.10
</div>

<script>

function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
}

function closeSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.remove('active');
}

// Close sidebar when clicking outside
document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    const toggle = document.querySelector('.sidebar-toggle');
    if (!sidebar.contains(event.target) && !toggle.contains(event.target)) {
        sidebar.classList.remove('active');
    }
});

const CHANNEL_ID = "UCU7ND2A5LJrm0g4tAMTXYAQ"; // ElRazy_YT
const MAX_VIDEOS = 12;
const FEED = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);

const URL = "https://api.allorigins.win/raw?url=" + FEED;

function formatDate(iso) {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });
}

function getText(node, selector) {
    const el = node.querySelector(selector);
    return el ? el.textContent : "";
}

function getAttr(node, selector, attr) {
    const el = node.querySelector(selector);
    return el ? el.getAttribute(attr) : "";
}

async function loadVideos() {
    try {
        const res = await fetch(URL);
        if (!res.ok) throw new Error(`Feed request failed: ${res.status}`);
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");

        const entries = xml.querySelectorAll("entry");

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        let count = 0;

        entries.forEach(entry => {
            if (count >= MAX_VIDEOS) return;

            const title = getText(entry, "title");
            const videoId = getText(entry, "yt\\:videoId");
            const published = getText(entry, "published");
            const watchUrl = getAttr(entry, "link[rel='alternate']", "href") || `https://www.youtube.com/watch?v=${videoId}`;

            const thumb =
                getAttr(entry, "media\\:group media\\:thumbnail", "url") ||
                `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

            const card = document.createElement("div");
            card.className = "video-card";
            card.setAttribute("role", "link");
            card.setAttribute("tabindex", "0");
            card.setAttribute("aria-label", `Watch: ${title}`);

            card.innerHTML = `
                <div class="video-wrapper">
                    <img src="${thumb}" alt="${title.replace(/"/g, "&quot;")}" loading="lazy" />
                    <div class="video-badge"><i class="fa-brands fa-youtube"></i> YouTube</div>
                </div>
                <div class="video-meta">
                    <h3>${title}</h3>
                    <div class="meta-row">
                        <time datetime="${published}">${formatDate(published)}</time>
                        <a class="watch-btn" href="${watchUrl}" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-play"></i> WATCH
                        </a>
                    </div>
                </div>
            `;

            const open = () => window.open(watchUrl, "_blank", "noopener,noreferrer");
            card.addEventListener("click", (e) => {
                if (e.target && e.target.closest && e.target.closest("a")) return;
                open();
            });
            card.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") open();
            });

            grid.appendChild(card);
            count++;
        });

        if (count === 0) {
            grid.innerHTML = `<div class="loading">No videos found.</div>`;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("grid").innerHTML =
            `<div class="loading">Failed to load videos. Please try again later.</div>`;
    }
}

loadVideos();

// Auto-refresh every 30 minutes
setInterval(loadVideos, 30 * 60 * 1000);

</script>

</body>
</html>
