<div class="version">
    v1.0.0.10

<script src="../assets/site.js"></script>
<script>
const CHANNEL_ID = "UCU7ND2A5LJrm0g4tAMTXYAQ"; // ElRazy_YT
const MAX_VIDEOS = 12;
const FEED = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);

const URL = "https://api.allorigins.win/raw?url=" + FEED;

function formatDate(iso) {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "";
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });
}

function getText(node, selector) {
    const el = node.querySelector(selector);
    return el ? el.textContent : "";
}

function getAttr(node, selector, attr) {
    const el = node.querySelector(selector);
    return el ? el.getAttribute(attr) : "";
}

async function loadVideos() {
    try {
        const res = await fetch(URL);
        if (!res.ok) throw new Error(`Feed request failed: ${res.status}`);
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");

        const entries = xml.querySelectorAll("entry");

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        let count = 0;

        entries.forEach(entry => {
            if (count >= MAX_VIDEOS) return;

            const title = getText(entry, "title");
            const videoId = getText(entry, "yt\\:videoId");
            const published = getText(entry, "published");
            const watchUrl = getAttr(entry, "link[rel='alternate']", "href") || `https://www.youtube.com/watch?v=${videoId}`;

            const thumb =
                getAttr(entry, "media\\:group media\\:thumbnail", "url") ||
                `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

            const card = document.createElement("div");
            card.className = "video-card";
            card.setAttribute("role", "link");
            card.setAttribute("tabindex", "0");
            card.setAttribute("aria-label", `Watch: ${title}`);

            card.innerHTML = `
                <div class="video-wrapper">
                    <img src="${thumb}" alt="${title.replace(/"/g, "&quot;")}" loading="lazy" />
                    <div class="video-badge"><i class="fa-brands fa-youtube"></i> YouTube</div>
                </div>
                <div class="video-meta">
                    <h3>${title}</h3>
                    <div class="meta-row">
                        <time datetime="${published}">${formatDate(published)}</time>
                        <a class="watch-btn" href="${watchUrl}" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-play"></i> WATCH
                        </a>
                    </div>
                </div>
            `;

            const open = () => window.open(watchUrl, "_blank", "noopener,noreferrer");
            card.addEventListener("click", (e) => {
                if (e.target && e.target.closest && e.target.closest("a")) return;
                open();
            });
            card.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") open();
            });

            grid.appendChild(card);
            count++;
        });

        if (count === 0) {
            grid.innerHTML = `<div class="loading">No videos found.</div>`;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("grid").innerHTML =
            `<div class="loading">Failed to load videos. Please try again later.</div>`;
    }
}

loadVideos();

// Auto-refresh every 30 minutes
setInterval(loadVideos, 30 * 60 * 1000);
</script>
